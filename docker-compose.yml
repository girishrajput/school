version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: school_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: schoolerp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - school_erp_network

volumes:
  postgres_data:

networks:
  school_erp_network:
    driver: bridge